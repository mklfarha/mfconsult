version: "2"
sql:
  - engine: "mysql"
    schema: "sql/schema/create.sql"
    queries: "sql/queries/"
    gen:
      go:
        emit_exact_table_names: true
        package: "mfconsultdb"
        out: "gen"
        emit_interface: true
        emit_json_tags: true
        rename: 
          amount_cents: AmountCents
          body: Body
          booking_id: BookingId
          certificate_url: CertificateURL
          client_id: ClientId
          created_at: CreatedAt
          currency: Currency
          decline_reason: DeclineReason
          email: Email
          envelope_id: EnvelopeId
          event_type: EventType
          help_details: HelpDetails
          help_topic: HelpTopic
          id: ID
          intake: Intake
          kind: Kind
          label: Label
          name: Name
          notes: Notes
          pay_link_expires_at: PayLinkExpiresAt
          pay_link_token: PayLinkToken
          payload: Payload
          payment: Payment
          payment_status: PaymentStatus
          portal_token: PortalToken
          prep_notes: PrepNotes
          processed_at: ProcessedAt
          published_at: PublishedAt
          purge_after: PurgeAfter
          reason: Reason
          review_decision: ReviewDecision
          reviewed_at: ReviewedAt
          scheduler_booking_id: SchedulerBookingId
          scheduling: Scheduling
          signed_at: SignedAt
          slot_end: SlotEnd
          slot_start: SlotStart
          source: Source
          stack_details: StackDetails
          status: Status
          stripe_ref: StripeRef
          terms_accepted_at: TermsAcceptedAt
          terms_accepted_ip: TermsAcceptedIp
          terms_version: TermsVersion
          timezone: Timezone
          updated_at: UpdatedAt
          url: URL
          video_url: VideoURL        
        overrides:          
          - db_type: "int"            
            go_type:              
              type: "int64"
          - db_type: "json"            
            go_type:
              type: "[]byte"  # workaround sqlc bug when reading null json columns            
          - db_type: "json"  
            nullable: true            
            go_type:
              type: "[]byte"  # workaround sqlc bug when reading null json columns            
          - db_type: datetime
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Time"
          - db_type: date
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Time"
          - db_type: time
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Time"
          - db_type: varchar
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "String"
          - db_type: char
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "String"
          - db_type: text
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "String"
          - db_type: "int"
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Int"
          - db_type: float
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Float"
          - db_type: double
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Float"
          - db_type: double
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Float"
          - db_type: tinyint
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Bool"
overrides:
  go: 
    rename:
      booking: Booking
      booking_document: BookingDocument
      booking_intake: BookingIntake
      booking_payment: BookingPayment
      booking_recap: BookingRecap
      booking_scheduling: BookingScheduling
      client: Client
      nda_document: NdaDocument
      webhook_event: WebhookEvent