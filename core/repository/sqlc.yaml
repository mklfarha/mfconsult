version: "2"
sql:
  - engine: "mysql"
    schema: "sql/schema/create.sql"
    queries: "sql/queries/"
    gen:
      go:
        emit_exact_table_names: true
        package: "mfconsultdb"
        out: "gen"
        emit_interface: true
        emit_json_tags: true
        rename: 
          amount_cents: AmountCents
          body: Body
          booking_id: BookingId
          budget_range: BudgetRange
          certificate_url: CertificateURL
          client_id: ClientId
          company: Company
          consumed_at: ConsumedAt
          contract_url: ContractURL
          created_at: CreatedAt
          created_ip: CreatedIp
          currency: Currency
          decline_reason: DeclineReason
          email: Email
          engagement_inquiry_id: EngagementInquiryId
          envelope_id: EnvelopeId
          event_type: EventType
          expires_at: ExpiresAt
          help_details: HelpDetails
          help_topic: HelpTopic
          id: ID
          intake: Intake
          kind: Kind
          label: Label
          name: Name
          nda_url: NdaURL
          notes: Notes
          payload: Payload
          payment: Payment
          payment_status: PaymentStatus
          phone: Phone
          prep_notes: PrepNotes
          processed_at: ProcessedAt
          project_summary: ProjectSummary
          published_at: PublishedAt
          purge_after: PurgeAfter
          purpose: Purpose
          reason: Reason
          review_decision: ReviewDecision
          review_notes: ReviewNotes
          reviewed_at: ReviewedAt
          scheduler_booking_id: SchedulerBookingId
          scheduling: Scheduling
          scope_details: ScopeDetails
          signed_at: SignedAt
          slot_end: SlotEnd
          slot_start: SlotStart
          source: Source
          stack_details: StackDetails
          status: Status
          stripe_ref: StripeRef
          terms_accepted_at: TermsAcceptedAt
          terms_accepted_ip: TermsAcceptedIp
          terms_version: TermsVersion
          timeline: Timeline
          timezone: Timezone
          token: Token
          updated_at: UpdatedAt
          url: URL
          video_url: VideoURL
          why_more_than_session: WhyMoreThanSession        
        overrides:          
          - db_type: "int"            
            go_type:              
              type: "int64"
          - db_type: "json"            
            go_type:
              type: "[]byte"  # workaround sqlc bug when reading null json columns            
          - db_type: "json"  
            nullable: true            
            go_type:
              type: "[]byte"  # workaround sqlc bug when reading null json columns            
          - db_type: datetime
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Time"
          - db_type: date
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Time"
          - db_type: time
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Time"
          - db_type: varchar
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "String"
          - db_type: char
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "String"
          - db_type: text
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "String"
          - db_type: "int"
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Int"
          - db_type: float
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Float"
          - db_type: double
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Float"
          - db_type: double
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Float"
          - db_type: tinyint
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Bool"
overrides:
  go: 
    rename:
      booking: Booking
      booking_document: BookingDocument
      booking_intake: BookingIntake
      booking_payment: BookingPayment
      booking_recap: BookingRecap
      booking_scheduling: BookingScheduling
      client: Client
      engagement_agreement: EngagementAgreement
      engagement_inquiry: EngagementInquiry
      magic_link: MagicLink
      webhook_event: WebhookEvent