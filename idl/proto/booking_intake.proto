syntax = "proto3";

option go_package = "mfconsult/idl/gen";
option java_multiple_files = true;
option java_package = "github.com/mklfarha/mfconsult";
option java_outer_classname = "BookingIntake";

package mfconsult;


import "enum.proto";

message BookingIntake {  
    string reason = 1;
    HelpTopic help_topic = 2;
    string help_details = 3;
    string stack_details = 4;
    string prep_notes = 5;    
}
