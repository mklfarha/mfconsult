syntax = "proto3";

option go_package = "mfconsult/idl/gen";
option java_multiple_files = true;
option java_package = "github.com/mklfarha/mfconsult";
option java_outer_classname = "BookingPayment";

package mfconsult;


import "enum.proto";

message BookingPayment {  
    int64 amount_cents = 1;
    string currency = 2;
    PaymentStatus payment_status = 3;
    string stripe_ref = 4;    
}
