syntax = "proto3";

option go_package = "mfconsult/idl/gen";
option java_multiple_files = true;
option java_package = "github.com/mklfarha/mfconsult";
option java_outer_classname = "WebhookEvent";

package mfconsult;


import "enum.proto";
import "google/protobuf/timestamp.proto";

message WebhookEvent {  
    string id = 1;
    WebhookSource source = 2;
    string event_type = 3;
    string payload = 4;
    google.protobuf.Timestamp processed_at = 5;
    google.protobuf.Timestamp created_at = 6;    
}
