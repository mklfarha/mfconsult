syntax = "proto3";

option go_package = "mfconsult/idl/gen";
option java_multiple_files = true;
option java_package = "github.com/mklfarha/mfconsult";
option java_outer_classname = "Mfconsult";

package mfconsult;

import "google/protobuf/field_mask.proto";

import "client.proto";

import "booking.proto";

import "booking_intake.proto";

import "booking_payment.proto";

import "booking_scheduling.proto";

import "booking_document.proto";

import "booking_recap.proto";

import "nda_document.proto";

import "webhook_event.proto";


service Mfconsult {    
    
    // client start
    rpc ListClient(ListClientRequest) returns (ListClientResponse){}
    rpc CreateClient(CreateClientRequest) returns (Client) {}
    rpc UpdateClient(UpdateClientRequest) returns (Client) {}
    // client end
    
    // booking start
    rpc ListBooking(ListBookingRequest) returns (ListBookingResponse){}
    rpc CreateBooking(CreateBookingRequest) returns (Booking) {}
    rpc UpdateBooking(UpdateBookingRequest) returns (Booking) {}
    // booking end
    
    // booking_intake start
    rpc ListBookingIntake(ListBookingIntakeRequest) returns (ListBookingIntakeResponse){}
    rpc CreateBookingIntake(CreateBookingIntakeRequest) returns (BookingIntake) {}
    rpc UpdateBookingIntake(UpdateBookingIntakeRequest) returns (BookingIntake) {}
    // booking_intake end
    
    // booking_payment start
    rpc ListBookingPayment(ListBookingPaymentRequest) returns (ListBookingPaymentResponse){}
    rpc CreateBookingPayment(CreateBookingPaymentRequest) returns (BookingPayment) {}
    rpc UpdateBookingPayment(UpdateBookingPaymentRequest) returns (BookingPayment) {}
    // booking_payment end
    
    // booking_scheduling start
    rpc ListBookingScheduling(ListBookingSchedulingRequest) returns (ListBookingSchedulingResponse){}
    rpc CreateBookingScheduling(CreateBookingSchedulingRequest) returns (BookingScheduling) {}
    rpc UpdateBookingScheduling(UpdateBookingSchedulingRequest) returns (BookingScheduling) {}
    // booking_scheduling end
    
    // booking_document start
    rpc ListBookingDocument(ListBookingDocumentRequest) returns (ListBookingDocumentResponse){}
    rpc CreateBookingDocument(CreateBookingDocumentRequest) returns (BookingDocument) {}
    rpc UpdateBookingDocument(UpdateBookingDocumentRequest) returns (BookingDocument) {}
    // booking_document end
    
    // booking_recap start
    rpc ListBookingRecap(ListBookingRecapRequest) returns (ListBookingRecapResponse){}
    rpc CreateBookingRecap(CreateBookingRecapRequest) returns (BookingRecap) {}
    rpc UpdateBookingRecap(UpdateBookingRecapRequest) returns (BookingRecap) {}
    // booking_recap end
    
    // nda_document start
    rpc ListNdaDocument(ListNdaDocumentRequest) returns (ListNdaDocumentResponse){}
    rpc CreateNdaDocument(CreateNdaDocumentRequest) returns (NdaDocument) {}
    rpc UpdateNdaDocument(UpdateNdaDocumentRequest) returns (NdaDocument) {}
    // nda_document end
    
    // webhook_event start
    rpc ListWebhookEvent(ListWebhookEventRequest) returns (ListWebhookEventResponse){}
    rpc CreateWebhookEvent(CreateWebhookEventRequest) returns (WebhookEvent) {}
    rpc UpdateWebhookEvent(UpdateWebhookEventRequest) returns (WebhookEvent) {}
    // webhook_event end
    
}


// client start
message ListClientRequest {
    // The maximum number of records to return. The service may return fewer than
    // this value.
    int32 page_size = 1;

    // A page token, received from a previous call.
    // Provide this to retrieve the subsequent page.    
    string page_token = 2;

    // https://google.aip.dev/160
    // https://pkg.go.dev/go.einride.tech/aip@v0.67.1
    // https://github.com/einride/aip-go    
    string filter = 3;
    string order_by = 4;  
    repeated string include_fields = 5;
    repeated string exclude_fields = 6;
    bool skip_cache = 7;
}

message ListClientResponse {
    repeated Client client = 1;

    // A token that can be sent as `page_token` to retrieve the next page.
    // If this field is omitted, there are no subsequent pages.
    string next_page_token = 2;
}

message CreateClientRequest {
    Client client = 1;
}

message UpdateClientRequest {
   
    Client client = 1;
  
    // The list of fields to update.
    google.protobuf.FieldMask update_mask = 2;
}
// client end

