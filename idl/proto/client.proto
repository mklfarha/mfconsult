syntax = "proto3";

option go_package = "mfconsult/idl/gen";
option java_multiple_files = true;
option java_package = "github.com/mklfarha/mfconsult";
option java_outer_classname = "Client";

package mfconsult;


import "google/protobuf/timestamp.proto";

message Client {  
    string id = 1;
    string name = 2;
    string email = 3;
    string timezone = 4;
    string notes = 5;
    google.protobuf.Timestamp created_at = 6;
    google.protobuf.Timestamp updated_at = 7;    
}
