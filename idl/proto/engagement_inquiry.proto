syntax = "proto3";

option go_package = "mfconsult/idl/gen";
option java_multiple_files = true;
option java_package = "github.com/mklfarha/mfconsult";
option java_outer_classname = "EngagementInquiry";

package mfconsult;


import "enum.proto";
import "google/protobuf/timestamp.proto";

message EngagementInquiry {  
    string id = 1;
    string client_id = 2;
    string name = 3;
    string email = 4;
    string phone = 5;
    string company = 6;
    string project_summary = 7;
    string why_more_than_session = 8;
    string scope_details = 9;
    string budget_range = 10;
    string timeline = 11;
    InquiryStatus status = 12;
    string review_notes = 13;
    google.protobuf.Timestamp created_at = 14;
    google.protobuf.Timestamp updated_at = 15;    
}
