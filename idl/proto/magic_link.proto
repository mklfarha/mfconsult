syntax = "proto3";

option go_package = "mfconsult/idl/gen";
option java_multiple_files = true;
option java_package = "github.com/mklfarha/mfconsult";
option java_outer_classname = "MagicLink";

package mfconsult;


import "enum.proto";
import "google/protobuf/timestamp.proto";

message MagicLink {  
    string id = 1;
    string client_id = 2;
    string email = 3;
    string token = 4;
    MagicLinkPurpose purpose = 5;
    google.protobuf.Timestamp expires_at = 6;
    google.protobuf.Timestamp consumed_at = 7;
    google.protobuf.Timestamp created_at = 8;
    string created_ip = 9;    
}
