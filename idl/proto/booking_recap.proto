syntax = "proto3";

option go_package = "mfconsult/idl/gen";
option java_multiple_files = true;
option java_package = "github.com/mklfarha/mfconsult";
option java_outer_classname = "BookingRecap";

package mfconsult;


import "google/protobuf/timestamp.proto";

message BookingRecap {  
    string id = 1;
    string booking_id = 2;
    string body = 3;
    google.protobuf.Timestamp published_at = 4;
    google.protobuf.Timestamp created_at = 5;    
}
