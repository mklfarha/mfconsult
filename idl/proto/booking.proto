syntax = "proto3";

option go_package = "mfconsult/idl/gen";
option java_multiple_files = true;
option java_package = "github.com/mklfarha/mfconsult";
option java_outer_classname = "Booking";

package mfconsult;


import "booking_intake.proto";
import "booking_payment.proto";
import "booking_scheduling.proto";
import "enum.proto";
import "google/protobuf/timestamp.proto";

message Booking {  
    string id = 1;
    string client_id = 2;
    BookingStatus status = 3;
    ReviewDecision review_decision = 4;
    google.protobuf.Timestamp reviewed_at = 5;
    string decline_reason = 6;
    repeated BookingIntake intake = 7;
    repeated BookingPayment payment = 8;
    repeated BookingScheduling scheduling = 9;
    string terms_version = 10;
    google.protobuf.Timestamp terms_accepted_at = 11;
    string terms_accepted_ip = 12;
    google.protobuf.Timestamp created_at = 13;
    google.protobuf.Timestamp updated_at = 14;    
}
