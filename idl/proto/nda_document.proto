syntax = "proto3";

option go_package = "mfconsult/idl/gen";
option java_multiple_files = true;
option java_package = "github.com/mklfarha/mfconsult";
option java_outer_classname = "NdaDocument";

package mfconsult;


import "enum.proto";
import "google/protobuf/timestamp.proto";

message NdaDocument {  
    string id = 1;
    string client_id = 2;
    string url = 3;
    NdaStatus status = 4;
    google.protobuf.Timestamp signed_at = 5;
    google.protobuf.Timestamp created_at = 6;
    string envelope_id = 7;
    string certificate_url = 8;    
}
