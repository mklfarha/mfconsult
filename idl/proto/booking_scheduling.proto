syntax = "proto3";

option go_package = "mfconsult/idl/gen";
option java_multiple_files = true;
option java_package = "github.com/mklfarha/mfconsult";
option java_outer_classname = "BookingScheduling";

package mfconsult;


import "google/protobuf/timestamp.proto";

message BookingScheduling {  
    google.protobuf.Timestamp slot_start = 1;
    google.protobuf.Timestamp slot_end = 2;
    string scheduler_booking_id = 3;
    string video_url = 4;    
}
